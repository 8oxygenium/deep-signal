    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>じゃんけんキッチン v0.1 - HAPOMU</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="cabinet" aria-label="じゃんけんキッチン v0.1">
      <header class="marquee">
        <p class="eyebrow">HAPOMU arcade prototype</p>
        <h1>じゃんけんキッチン <span>v0.1</span></h1>
        <p class="sub-title">JANKEN KITCHEN</p>
        <p>JAN... KEN... PON! 3つのボタンでOMU COINを集めよう。</p>
      </header>

      <section class="machine">
        <div class="screen">
          <div class="lamp-row" aria-label="janken lamps">
            <span id="lampJan" class="lamp">JAN</span>
            <span id="lampKen" class="lamp">KEN</span>
            <span id="lampPon" class="lamp">PON!</span>
          </div>

          <div class="versus">
            <div>
              <p class="label">PLAYER</p>
              <div id="playerIcon" class="hand-icon hidden" aria-hidden="true"></div>
              <strong id="playerHand">---</strong>
            </div>
            <div>
              <p class="label">CPU / RIVAL</p>
              <div id="cpuIcon" class="hand-icon hidden" aria-hidden="true"></div>
              <strong id="cpuHand">---</strong>
              <small id="rivalName">INSERT COIN</small>
            </div>
          </div>

          <p id="resultText" class="result">INSERT COIN</p>
          <p id="commentText" class="comment">1 / 2 / 3 or big buttons</p>
        </div>

        <aside class="scoreboard">
          <div><span>OMU COIN</span><strong id="coinValue">0</strong></div>
          <div><span>LIFE</span><strong id="lifeValue">3</strong></div>
          <div><span>STREAK</span><strong id="streakValue">0</strong></div>
        </aside>

        <div class="controls" aria-label="janken controls">
          <button class="hand-button guu" data-hand="GUU" type="button"><span class="mini-hand mini-guu"></span>GUU<br><span>1</span></button>
          <button class="hand-button choki" data-hand="CHOKI" type="button"><span class="mini-hand mini-choki"></span>CHOKI<br><span>2</span></button>
          <button class="hand-button paa" data-hand="PAA" type="button"><span class="mini-hand mini-paa"></span>PAA<br><span>3</span></button>
        </div>

        <button id="resetButton" class="reset-button" type="button">RESET / INSERT COIN</button>
      </section>

      <nav class="links" aria-label="page links">
        <a href="../janken-kitchen.html">Back to Concept</a>
        <a href="../index.html">Back to Games</a>
        <a href="../../index.html">Back to Top</a>
      </nav>
    </main>

    <script src="game.js"></script>
  </body>
</html>
