<head>

  <title>のせのせプリン v0.3.1 - HAPOMU</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #FFF8E7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', 'Meiryo', sans-serif;
      padding: 8px 0 16px;
    }

    h1 {
      font-size: 1.1rem;
      color: #8B5E3C;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    #canvasWrap {
      position: relative;
      display: inline-block;
    }

    #gameCanvas {
      display: block;
      border: 2px solid #D4A96A;
      border-radius: 8px;
      background: #FFF8E7;
      touch-action: none;
    }

    /* ---- オーバーレイ（クリア / GAME OVER） ---- */
    #overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 248, 231, 0.88);
      border-radius: 8px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
    }

    #overlayMsg {
      font-size: 1.4rem;
      font-weight: bold;
      color: #6B3A2A;
      text-align: center;
      line-height: 1.5;
      padding: 0 16px;
    }

    #btnRestart {
      padding: 14px 36px;
      font-size: 1.2rem;
      font-family: inherit;
      font-weight: bold;
      background: #E8734A;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.18);
      letter-spacing: 0.05em;
      transition: transform 0.08s, box-shadow 0.08s;
    }

    #btnRestart:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.18);
    }

    #controls {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      align-items: center;
    }

    #controls button {
      width: 90px;
      height: 56px;
      font-size: 1.1rem;
      font-family: inherit;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 0.05em;
      transition: transform 0.08s, box-shadow 0.08s, background 0.08s;
      box-shadow: 0 4px 0 rgba(0,0,0,0.18);
      user-select: none;
      -webkit-user-select: none;
    }

    #btnLeft, #btnRight {
      background: #F5C518;
      color: #5C3D11;
    }

    #btnDrop {
      background: #E8734A;
      color: #fff;
      width: 110px;
    }

    #controls button:active,
    #controls button.pressed {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.18);
      background: #d4a800;
    }

    #btnDrop:active,
    #btnDrop.pressed {
      background: #c45a30;
    }

    #navLinks {
      margin-top: 14px;
      display: flex;
      gap: 16px;
      font-size: 0.78rem;
    }

    #navLinks a {
      color: #8B5E3C;
      text-decoration: none;
      opacity: 0.7;
    }

    #navLinks a:hover {
      opacity: 1;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>のせのせプリン</h1>
  <div id="canvasWrap">
    <canvas id="gameCanvas" width="360" height="580"></canvas>
    <div id="overlay">
      <div id="overlayMsg"></div>
      <button id="btnRestart">もう一回！</button>
    </div>
  </div>
  <div id="controls">
    <button id="btnLeft">←</button>
    <button id="btnDrop">おとす！</button>
    <button id="btnRight">→</button>
  </div>
  <nav id="navLinks">
    <a href="../nosenose-pudding.html">Back to Concept</a>
    <a href="../index.html">Back to Games</a>
    <a href="../../index.html">Back to Top</a>
  </nav>

  <script>
    // ---- URLにバージョンクエリを付与 ----
    (function() {
      const VERSION = '0.3.1';
      const url = new URL(location.href);
      if (url.searchParams.get('v') !== VERSION) {
        url.searchParams.set('v', VERSION);
        history.replaceState(null, '', url.toString());
      }
    })();

    // ---- 定数 ----
    const VERSION_LABEL = 'v0.3.1';
    const GRAVITY = 0.3;
    const PUDDING_RADIUS = 30;
    const CANVAS_W = 360;
    const CANVAS_H = 580;

    // お皿
    const DISH_Y = 520;           // お皿上面のY座標
    const DISH_CX = 180;          // お皿中心X
    const DISH_HALF_W = 100;      // お皿の有効乗れる半幅（円の中心が乗れる範囲）
    const DISH_VISUAL_RX = 110;   // お皿の見た目横幅（半径）
    const DISH_VISUAL_RY = 16;    // お皿の見た目縦幅（楕円の縦半径）

    // 落下開始位置
    const SPAWN_Y = 50;
    const MOVE_STEP = 18;
    const MIN_X = 40;
    const MAX_X = 320;

    // 崩れ判定
    const SLIDE_THRESHOLD_DISH    = 1.0;
    const SLIDE_THRESHOLD_PUDDING = 0.5;

    // クリア判定：10個settled かつ 最上プリンがお皿上面から4r以上高いこと（縦積み保証）
    const CLEAR_COUNT = 10;
    const CLEAR_MIN_Y = DISH_Y - PUDDING_RADIUS * 4; // = 520 - 120 = 400

    // ---- DOM ----
    const canvas  = document.getElementById('gameCanvas');
    const ctx     = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlayMsg');

    // ---- ゲーム状態 ----
    // ① クリア判定・② GAME OVER判定・③ リスタートを束ねる1変数
    let gameState = 'playing'; // 'playing' | 'clear' | 'gameover'

    // ---- プリン配列 ----
    let puddings = [];
    let fallingPudding = null;
    let nextX = DISH_CX;
    let waitingDrop = true;
    let spawnTimer = null; // Fix A: clearTimeout管理用

    // ---- 状態変更ヘルパー ----
    function setGameState(state) {
      gameState = state;
      if (state === 'clear') {
        overlayMsg.textContent = '🎉 10こ つめたよ！\nすごい！';
        overlayMsg.style.whiteSpace = 'pre-line';
        overlay.style.display = 'flex';
      } else if (state === 'gameover') {
        overlayMsg.textContent = 'おしい！\nもう一回チャレンジしよう！';
        overlayMsg.style.whiteSpace = 'pre-line';
        overlay.style.display = 'flex';
      } else {
        overlay.style.display = 'none';
      }
    }

    // ---- リスタート ③ ----
    function restartGame() {
      clearTimeout(spawnTimer);  // Fix A: 残りsetTimeoutをキャンセル
      spawnTimer = null;
      puddings = [];
      fallingPudding = null;
      nextX = DISH_CX;
      waitingDrop = true;
      setGameState('playing');
      spawnPudding();
    }

    // ---- プリン生成 ----
    function spawnPudding() {
      if (gameState !== 'playing') return;
      fallingPudding = {
        x: nextX,
        y: SPAWN_Y,
        angle: 0,
        targetAngle: 0,
        vy: 0,
        vAngle: 0,
        vx: 0,
        settled: false,
        sliding: false,
        radius: PUDDING_RADIUS,
        bounceScale: 1.0
      };
      waitingDrop = true;
    }

    // ---- 着地処理 ----
    function settle(pudding, base) {
      let offset;

      if (base === null) {
        offset = (pudding.x - DISH_CX) / DISH_HALF_W;
        offset = Math.max(-1.5, Math.min(1.5, offset));
      } else {
        const totalR = pudding.radius + base.radius;
        offset = (pudding.x - base.x) / totalR;
        offset = Math.max(-1.5, Math.min(1.5, offset));
      }

      const slideThreshold = (base === null) ? SLIDE_THRESHOLD_DISH : SLIDE_THRESHOLD_PUDDING;
      if (Math.abs(offset) > slideThreshold) {
        // はみ出し過ぎ → 滑り落ちる
        pudding.settled = false;
        pudding.sliding = true;
        pudding.vx = offset * 3.5;
        if (pudding.vy <= 0) pudding.vy = 0.5;
        fallingPudding = null;
        puddings.push(pudding);
        spawnTimer = setTimeout(spawnPudding, 700); // Fix A
      } else {
        // 正常着地
        pudding.settled = true;
        pudding.sliding = false;
        const baseAngle = (base === null) ? 0 : base.angle;
        pudding.targetAngle = baseAngle + offset * 0.45;
        pudding.vy = 0;
        pudding.vx = 0;
        pudding.bounceScale = 1.2;
        puddings.push(pudding);
        fallingPudding = null;
        spawnTimer = setTimeout(spawnPudding, 500); // Fix A
      }
    }

    // ---- 物理更新 ----
    function update() {
      if (gameState !== 'playing') return;

      // 落下中プリンの更新
      if (fallingPudding && !waitingDrop) {
        const p = fallingPudding;
        p.vy += GRAVITY;
        p.y += p.vy;
        p.x += p.vx;

        // お皿との衝突判定
        if (p.y + p.radius >= DISH_Y) {
          if (Math.abs(p.x - DISH_CX) < DISH_HALF_W + p.radius * 0.5) {
            p.y = DISH_Y - p.radius;
            settle(p, null);
            return;
          } else {
            // ② お皿の外に外れて落下 → GAME OVER
            if (p.y > CANVAS_H + 60) {
              setGameState('gameover');
              fallingPudding = null;
              return;
            }
          }
        }

        // 着地済みプリンとの衝突判定（上から乗る場合のみ）
        for (let i = puddings.length - 1; i >= 0; i--) {
          const q = puddings[i];
          if (!q.settled) continue;
          const dx = p.x - q.x;
          const dy = p.y - q.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = p.radius + q.radius;
          if (dist < minDist && dy < 0) {
            p.y = q.y - minDist;
            settle(p, q);
            return;
          }
        }

        // ② 画面外に消えた（完全に落下）→ GAME OVER
        if (p.y > CANVAS_H + 60) {
          setGameState('gameover');
          fallingPudding = null;
          return;
        }
      }

      // slidingプリンの更新（滑り落ち）
      for (let i = puddings.length - 1; i >= 0; i--) {
        const p = puddings[i];
        if (!p.sliding) continue;
        p.vy += GRAVITY;
        p.y += p.vy;
        p.x += p.vx;
        p.angle += p.vAngle + (p.vx > 0 ? 0.04 : -0.04);

        // お皿との衝突（滑り中）
        if (p.y + p.radius >= DISH_Y) {
          p.y = DISH_Y - p.radius;
          p.vy *= -0.3;
        }

        // settled済みプリンとの衝突
        for (let j = puddings.length - 1; j >= 0; j--) {
          if (i === j) continue;
          const q = puddings[j];
          if (!q.settled) continue;
          const dx = p.x - q.x;
          const dy = p.y - q.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = p.radius + q.radius;
          if (dist < minDist && dist > 0) {
            const nx = dx / dist, ny = dy / dist;
            const overlap = minDist - dist;
            p.x += nx * overlap;
            p.y += ny * overlap;
            const dot = p.vx * nx + p.vy * ny;
            p.vx -= dot * nx * 1.3;
            p.vy -= dot * ny * 1.3;
          }
        }
      }

      // settledプリンのangle・bounceScale イージング
      for (const p of puddings) {
        if (!p.settled) continue;
        p.angle += (p.targetAngle - p.angle) * 0.15;
        p.bounceScale += (1.0 - p.bounceScale) * 0.2;
      }

      // ② 画面外に出たプリンを除去：slidingが消えたらGAME OVER
      puddings = puddings.filter(p => {
        if (p.y >= CANVAS_H + 80) {
          if (p.sliding && gameState === 'playing') setGameState('gameover');
          return false;
        }
        return true;
      });

      // ① クリア判定：settled10個以上かつ縦積みあり
      if (gameState === 'playing') {
        const settled = puddings.filter(p => p.settled);
        if (settled.length >= CLEAR_COUNT) {
          const minY = Math.min(...settled.map(p => p.y));
          if (minY < CLEAR_MIN_Y) {
            setGameState('clear');
          }
        }
      }
    }

    // ---- 描画ヘルパー ----
    function drawDish() {
      ctx.save();
      ctx.translate(DISH_CX, DISH_Y + DISH_VISUAL_RY * 0.3);

      ctx.beginPath();
      ctx.ellipse(0, 8, DISH_VISUAL_RX, DISH_VISUAL_RY, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(0, 0, DISH_VISUAL_RX, DISH_VISUAL_RY, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#FFFFFF';
      ctx.strokeStyle = '#C8A87C';
      ctx.lineWidth = 2.5;
      ctx.fill();
      ctx.stroke();

      ctx.restore();
    }

    function drawPudding(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      if (p.bounceScale && p.bounceScale !== 1.0) {
        ctx.scale(p.bounceScale, p.bounceScale);
      }

      const r = p.radius;

      if (p.settled) {
        ctx.beginPath();
        ctx.ellipse(3, r * 0.6, r * 0.85, r * 0.22, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.10)';
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = '#F5C518';
      ctx.fill();
      ctx.strokeStyle = '#D4A000';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, -r * 0.15, r * 0.72, Math.PI * 1.1, Math.PI * 1.9, false);
      ctx.strokeStyle = 'rgba(120, 60, 10, 0.55)';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, -r * 0.15, r * 0.72, Math.PI * 1.15, Math.PI * 1.45, false);
      ctx.strokeStyle = 'rgba(200, 120, 30, 0.35)';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, -r * 0.6, r * 0.32, 0, Math.PI * 2);
      ctx.fillStyle = '#F0B800';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(-r * 0.25, -r * 0.3, r * 0.18, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();

      ctx.restore();
    }

    function drawWaitingPudding() {
      if (!fallingPudding || !waitingDrop) return;
      const p = fallingPudding;

      ctx.save();
      ctx.setLineDash([4, 6]);
      ctx.strokeStyle = 'rgba(180,140,60,0.35)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y + PUDDING_RADIUS);
      ctx.lineTo(p.x, DISH_Y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      drawPudding(p);
    }

    function drawVersionLabel() {
      ctx.save();
      ctx.font = '11px monospace';
      ctx.fillStyle = 'rgba(140, 90, 40, 0.5)';
      ctx.textAlign = 'right';
      ctx.fillText(VERSION_LABEL, CANVAS_W - 8, CANVAS_H - 8);
      ctx.restore();
    }

    // ---- メインループ ----
    function draw() {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

      ctx.fillStyle = '#FFF8E7';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      drawDish();

      for (const p of puddings) {
        drawPudding(p);
      }

      if (fallingPudding) {
        if (waitingDrop) {
          drawWaitingPudding();
        } else {
          drawPudding(fallingPudding);
        }
      }

      drawVersionLabel();

      // 「◯こ のった！」常時表示（回帰維持）
      const settledCount = puddings.filter(p => p.settled).length;
      ctx.save();
      ctx.font = 'bold 20px sans-serif';
      ctx.fillStyle = '#6B3A2A';
      ctx.textAlign = 'left';
      ctx.fillText(`${settledCount}こ のった！`, 10, 30);
      ctx.restore();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ---- ボタン操作 ----
    function moveLeft() {
      if (gameState !== 'playing') return;
      nextX = Math.max(MIN_X, nextX - MOVE_STEP);
      if (fallingPudding && waitingDrop) {
        fallingPudding.x = nextX;
      }
    }

    function moveRight() {
      if (gameState !== 'playing') return;
      nextX = Math.min(MAX_X, nextX + MOVE_STEP);
      if (fallingPudding && waitingDrop) {
        fallingPudding.x = nextX;
      }
    }

    function doDrop() {
      if (gameState !== 'playing') return;
      if (fallingPudding && waitingDrop) {
        waitingDrop = false;
        fallingPudding.vy = 2;
      }
    }

    function flashBtn(el) {
      el.classList.add('pressed');
      setTimeout(() => el.classList.remove('pressed'), 120);
    }

    const btnLeft  = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');
    const btnDrop  = document.getElementById('btnDrop');
    const btnRestart = document.getElementById('btnRestart');

    btnLeft.addEventListener('click', () => { flashBtn(btnLeft); moveLeft(); });
    btnRight.addEventListener('click', () => { flashBtn(btnRight); moveRight(); });
    btnDrop.addEventListener('click', () => { flashBtn(btnDrop); doDrop(); });
    btnRestart.addEventListener('click', restartGame);

    // タッチ長押し対応（左右ボタン）
    let leftInterval = null;
    let rightInterval = null;

    btnLeft.addEventListener('touchstart', (e) => {
      e.preventDefault();
      flashBtn(btnLeft);
      moveLeft();
      leftInterval = setInterval(moveLeft, 130);
    });
    btnLeft.addEventListener('touchend', () => {
      clearInterval(leftInterval);
    });

    btnRight.addEventListener('touchstart', (e) => {
      e.preventDefault();
      flashBtn(btnRight);
      moveRight();
      rightInterval = setInterval(moveRight, 130);
    });
    btnRight.addEventListener('touchend', () => {
      clearInterval(rightInterval);
    });

    // キーボード対応
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') { moveLeft(); }
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { moveRight(); }
      if (e.key === ' ') { e.preventDefault(); doDrop(); }
      if (e.key === 'Enter' && gameState !== 'playing') { restartGame(); }
    });

    // ---- 起動 ----
    spawnPudding();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
